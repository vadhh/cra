<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Access Gate — Sydeco LightML</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <!-- Tailwind play CDN is a dynamic build endpoint — SRI not possible; replace with CLI build for production -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.12/dist/cdn.min.js" integrity="sha384-pb6hrQvo4s23cEUFtj0CZkzGE3jyK3pj26RIupXXxhSrrcUA/Cn0lZgcCrGH0t6L" crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "background": "#0e131f",
            "surface-container-lowest": "#090e1a",
            "on-surface": "#dee2f4",
            "on-surface-variant": "#d0c5af",
            "primary": "#d4af37",
            "on-primary-fixed": "#241a00",
            "outline-variant": "#4d4635",
          },
          fontFamily: {
            "display": ["Playfair Display", "serif"],
            "body": ["Plus Jakarta Sans", "system-ui", "sans-serif"],
          },
          spacing: { "margin-desktop": "64px", "margin-mobile": "16px" }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
    .obsidian-panel { background:#161b28; border:1px solid rgba(212,175,55,0.15); box-shadow:0 25px 50px -12px rgba(0,0,0,0.5); }
    .gold-btn { background:linear-gradient(135deg,#d4af37 0%,#b8952e 100%); transition:all 0.3s cubic-bezier(0.4,0,0.2,1); }
    .gold-btn:hover:not(:disabled) { box-shadow:0 0 25px rgba(212,175,55,0.3); filter:brightness(1.1); }
    .gold-btn:disabled { opacity:0.7; cursor:not-allowed; }
  </style>
</head>
<body class="bg-background text-on-surface font-body">
  <main
    class="min-h-screen flex flex-col items-center justify-center px-4 md:px-16 py-12"
    x-data="{ email: '', password: '', loading: false, errorMsg: '' }"
  >
    <div class="mb-10 text-center">
      <h1 class="font-display text-5xl text-primary tracking-tight">Access Gate</h1>
      <p class="text-xs text-on-surface-variant uppercase tracking-[0.3em] mt-3 font-semibold">Sovereign Intelligence Protocol</p>
    </div>

    <section class="obsidian-panel w-full max-w-md p-10 rounded-lg">
      <div class="space-y-8">
        <header>
          <h2 class="font-display text-2xl text-on-surface">Secure Identity Verification</h2>
          <p class="text-on-surface-variant mt-1 opacity-80 text-sm">Authorized personnel only.</p>
        </header>

        <form class="space-y-5" @submit.prevent="
          loading = true; errorMsg = '';
          try {
            const resp = await fetch('/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ email, password }),
            });
            if (resp.ok) { window.location.href = '/'; return; }
            errorMsg = 'Invalid credentials. Please try again.';
          } catch (err) {
            errorMsg = 'Server unreachable. Please try again later.';
          } finally { loading = false; }
        ">
          <div class="space-y-2">
            <label class="text-xs font-bold text-on-surface-variant flex items-center gap-2 uppercase tracking-widest" for="email">
              <span class="material-symbols-outlined text-[16px]">mail</span>Institutional Email
            </label>
            <input class="w-full bg-surface-container-lowest border border-outline-variant/30 text-on-surface px-4 py-3.5 rounded focus:outline-none focus:border-primary/60 focus:ring-1 focus:ring-primary/40 transition-all text-sm placeholder:text-on-surface/20"
              id="email" type="email" x-model="email" placeholder="name@sydeco.legal" required autocomplete="email"/>
          </div>

          <div class="space-y-2">
            <label class="text-xs font-bold text-on-surface-variant flex items-center gap-2 uppercase tracking-widest" for="password">
              <span class="material-symbols-outlined text-[16px]">lock</span>Access Key
            </label>
            <input class="w-full bg-surface-container-lowest border border-outline-variant/30 text-on-surface px-4 py-3.5 rounded focus:outline-none focus:border-primary/60 focus:ring-1 focus:ring-primary/40 transition-all text-sm placeholder:text-on-surface/20"
              id="password" type="password" x-model="password" placeholder="••••••••" required autocomplete="current-password"/>
          </div>

          <div class="flex items-center gap-2 bg-red-900/20 border border-red-500/30 rounded px-4 py-3 text-red-300 text-sm"
            x-show="errorMsg" x-transition x-text="errorMsg" style="display:none;"></div>

          <button class="gold-btn w-full py-4 rounded font-bold text-on-primary-fixed uppercase tracking-widest flex items-center justify-center gap-3 text-sm"
            type="submit" :disabled="loading">
            <span x-text="loading ? 'Authenticating…' : 'Initiate Portal Access'">Initiate Portal Access</span>
            <svg x-show="loading" class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24" style="display:none;">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" fill="currentColor"></path>
            </svg>
          </button>
        </form>

        <footer class="pt-6 border-t border-outline-variant/10 text-center">
          <p class="text-xs text-on-surface-variant/60 leading-relaxed">
            Connection secured via AES-256 Sovereign Protocol.<br/>
            Need assistance? <a class="text-primary/80 hover:text-primary transition-colors" href="#">Contact System Admin</a>
          </p>
        </footer>
      </div>
    </section>

    <div class="mt-16 w-full flex flex-col md:flex-row justify-between items-center opacity-40 text-xs">
      <div class="font-semibold tracking-wide">© 2024 Sydeco LightML. Sovereign Intelligence Protocol.</div>
      <div class="flex gap-8 mt-4 md:mt-0">
        <a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
        <a class="hover:text-primary transition-colors" href="#">Terms of Use</a>
        <a class="hover:text-primary transition-colors" href="#">Compliance</a>
      </div>
    </div>
  </main>
</body>
</html>
